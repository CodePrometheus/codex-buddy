[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
# Don't auto-pick a README (picks README.es.md over README.md); list files explicitly instead
auto-includes = false
include = ["README.md", "LICENSE"]
# release.yml has a hand patch (checkout `ref: main` in publish-homebrew-formula) that `dist
# generate` doesn't know how to produce, since the tap is this same repo; allow that drift instead
# of `dist` refusing to run because the committed file doesn't match its generator output.
allow-dirty = ["ci"]
# The Homebrew tap to publish the formula to (this same repo)
tap = "CodePrometheus/codex-buddy"
# The Homebrew formula name
formula = "codex-buddy"
# Publish the Homebrew formula on release
publish-jobs = ["homebrew"]
